name: Deploy CV (sincroniza fecha + GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sincronizar fecha de actualización en la metadata
        run: |
          D=$(TZ='America/Bogota' date +%Y-%m-%d)
          DT=$(TZ='America/Bogota' date +%Y-%m-%dT%H:%M:%S%:z)
          echo "Fecha de despliegue: $DT"
          sed -i -E "s|(property=\"og:updated_time\" content=\")[^\"]*|\1${DT}|" index.html
          sed -i -E "s|(property=\"article:modified_time\" content=\")[^\"]*|\1${DT}|" index.html
          sed -i -E "s|(\"dateModified\": \")[0-9]{4}-[0-9]{2}-[0-9]{2}|\1${D}|" index.html
          if [ -f sitemap.xml ]; then
            sed -i -E "s|(<lastmod>)[^<]*|\1${D}|" sitemap.xml
          fi

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto del sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
